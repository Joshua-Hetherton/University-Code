<!DOCTYPE html>
<html>
<head>
    <title>CRUD Lab</title>
</head>

<body style="font-family: sans-serif; padding: 40px; background: #f4f4f4;">

    <h1>My MongoDB Blog</h1>

    <div style="background: white; padding: 20px; border-radius: 8px; box-shadow: 0 2px 5px rgba(0,0,0,0.1);">

        <h3 id="form-title">Create a New Post</h3>

        <input type="hidden" id="post-id">

        <input
            type="text"
            id="title"
            placeholder="Enter Title"
            style="width: 100%; padding: 10px; margin-bottom: 10px;"
        >

        <textarea
            id="content"
            placeholder="Enter Content"
            style="width: 100%; padding: 10px; height: 80px; margin-bottom: 10px;"
        ></textarea>

        <button
            onclick="savePost()"
            style="background: #28a745; color: white; border: none; padding: 10px 20px; cursor: pointer;"
        >
            Save Post
        </button>

        <button
            onclick="clearForm()"
            id="cancel-btn"
            style="display:none; padding: 10px;"
        >
            Cancel
        </button>

    </div>

    <hr style="margin: 40px 0;">

    <h2>Recent Posts</h2>

    <div id="post-list"></div>

    <script>

        // FETCH: Gets the data and builds the HTML list
        async function loadPosts() {

            const res = await fetch('/feed/posts');
            const data = await res.json();

            const list = document.getElementById('post-list');

            list.innerHTML = data.posts.map(p => `
                <div style="background: white; margin-bottom: 15px; padding: 15px; border-left: 5px solid #007bff;">
                    <strong>${p.title}</strong>
                    <p>${p.content}</p>
                    <button onclick="editPost('${p._id}', '${p.title}', '${p.content}')">Edit</button>
                    <button onclick="deletePost('${p._id}')" style="color: red;">Delete</button>
                </div>
            `).join('');
        }

        // CREATE / UPDATE: Decides which HTTP method to use
        async function savePost() {

            const id = document.getElementById('post-id').value;
            const title = document.getElementById('title').value;
            const content = document.getElementById('content').value;

            const method = id ? 'PUT' : 'POST';
            const url = id ? `/feed/post/${id}` : '/feed/post';

            await fetch(url, {
                method: method,
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ title, content })
            });

            clearForm();
            loadPosts(); // Refresh the list
        }

        // HELPERS
        function editPost(id, title, content) {

            document.getElementById('post-id').value = id;
            document.getElementById('title').value = title;
            document.getElementById('content').value = content;

            document.getElementById('form-title').innerText = 'Editing Post';
            document.getElementById('cancel-btn').style.display = 'inline';
        }

        async function deletePost(id) {

            if (confirm('Are you sure you want to delete this?')) {
                await fetch(`/feed/post/${id}`, { method: 'DELETE' });
                loadPosts();
            }
        }

        function clearForm() {

            document.getElementById('post-id').value = '';
            document.getElementById('title').value = '';
            document.getElementById('content').value = '';

            document.getElementById('form-title').innerText = 'Create a New Post';
            document.getElementById('cancel-btn').style.display = 'none';
        }

        // Initial load
        loadPosts();

    </script>

</body>
</html>
